<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 400px;
            margin: 80px auto;
            background: #fff;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .success {
            color: #27ae60;
            font-size: 1.2em;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success">Login successful!</div>
        <h2>Welcome to your dashboard</h2>
        <p>You have successfully logged in.</p>
    </div>
</body>
</html>
